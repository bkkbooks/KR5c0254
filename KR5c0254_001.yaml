front:
  text: 祕藏通玄變化六陰洞微遁甲直經卷上履一太上曰夫欲傳授之士須當澡沐潔身鄭重先炷名香仰視北辰虔心祝香仰啓昊天玉皇上帝太上九天玄女元君聖師玄天上帝臣乃太上弟子昨受太上玉女六陰洞微經法皈身佩奉依法行持伏願天垂福祐地賜休祥大道速成願心早畢臣拜授此經已後永為行持無輕語誑妄無易泄非人無橫用邪為無往求雜慕臣從得此法願求長生次利百姓濟民助國退獨入清蕩妖殺邪惟希三天大鑒萬象咸知賜臣通靈使臣遂願如或妄行妖邪臣甘犯天誅聖真勿祐急急如律令施行
  hash: sha256:9d26dbc9a9b7e9adc41a0c2e562e1f591af46625c98bb25023b15db1e74f3c62
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0254_HFL_001-001a, image: hfl/0576/0576-004.png}
body:
  text: 傳後涓吉日置油麵餅七箇歡喜團七箇淨布七條棗湯七盞於二更時星月郎明向北斗下置七位供養烈火豐香手執此經稽首百拜告云臣傾心瀝志集氣會神再拜上香以虔盟誓臣乃太上之子久行清靜誠測天心欲離塵凡願歸蓬島臣虔誠拜告有事上聞伏願真慈俯垂憫鑒臣以今於某月日承受太上玉女六陰洞微經臣欲行持願垂盟鑒臣受此法不敢輕為非急難救人誓無謬用臣今虔誠恭對尊儀誠誓此言或不遵依甘當罪罰凡有急緩救應願垂加護即前進上香再拜低聲祝曰臣欲二三玉女為臣之使上達天廷下巡世界飛符走印袪邪斬妖一切應用臣欲驅使伏希尊慈俯垂降鑒復上香再拜祝曰臣所言事已告御前伏冀威靈時加護祐再拜訖收香座再選吉日備茶一分酒一盞果子一盤二更時不令人見向北辰下簷底設香座上香再拜虔誠啓請北極鎮天真武靈應真君今夜今時願垂降駕臣有小事百拜上奏御前臣奉太上之勑法籙行持斬鬼袪邪助國安家求仙學道給濟孤貧欲以六陰洞微經行持驅使二三玉女和平天地制禦邪魔於理所為欲從其願伏願帝君衷鑒加助威靈敢仗高真永居正位安印之所即是道場伏望聖慈下恢聖德即以兩大指作訣祝曰天清地寧陰濁陽清瞪目散髮龜蛇合形手執寶劍斬伐邪精來居吾室主六陰尊聽吾告啓從吾所陳永鎮中位護至仙成急急如律令七遍再上香祝曰臣欲以二三玉女為使一切所作祛使願帝君加護同佐神庥不勝大幸再拜收座辭退大會祭儀癸亥日先寫狀并符請聖間人在外先一夜備供養上香設拜面北壇前存神叩齒乃祝曰某郡佩某籙弟子謹謹先伸拜請祖師北極鎮天真武佑聖真君願垂聖駕證盟大法上香酌酒丁卯真君前啓請奉請丁卯玉女足日之字保中無極仁福真君聞臣之香降臨壇所焚香焚合同符誦本身呪取本方氣吹之次啓奉請丁丑玉女氣無上字太和橫天仁實真君聞臣之香降臨壇所奉請丁亥玉女陸明集字廣陽都府仁元真君聞臣之香降臨壇所奉請丁酉玉女救欽靈字正一亞夫仁休真君聞臣之香降臨壇所奉請丁未玉女乘素靈字玄英無比仁至真君聞臣之香降臨壇所奉請丁巳玉女朱福稱字文廣高上仁德真君聞臣之香降臨壇所右臣今奉請二三玉女已幸降臨伏乞真靈俯垂大造隨請下降法駕受臣懇禱左手中指右手大煞文叩齒三十六通念六陰六丁玉女八素隱言呪曰龍曜九氣五嶽從之天蓬四聖十元八極斗星百靈十二日直玉女六丁願垂真光助法敕攝吾奉太上老君洞徹律令敕連念三遍逐一攝六丁本身訣玉女名召之罡步藏形隱迹步我罡魁我見其人人無我知動植如意叱聲鬼隨疾如水火鼓舞風雷變澤成山翻地覆天我身堅固安然默然萬載長生與道合仙急急如九天玄女律令敕取逐方氣吹壇中奉請玉女依位而坐燒本身符六道於壇中叩齒暝目存想玉女六位降臨壇中再拜上香祝曰臣今奉請真武真君外次焚香請召二三玉女想已降臨坐次弟子某稽首再拜某是太上老君弟子久持聖道欲願長生履清淨規行奧妙事長親至道稟命修行上薦祖先魂神下濟萬民災疫臣奉持法籙依道攝行今欲置壇裝嚴淨室依科營辦享祭真君仰賴威光俯垂洞鑒某欲克仙理為國安民呪水行符祛邪治鬼上助國家之用下扶身命之為不論巨細一切運動之事皆賴威仙當作使者助某行持聽某指陳東西南北悉皆從順稱名畫印如聞啓請即時來臨記其所言不可失信上香再拜輕輕近前低語云吾領太上之令玉皇之勑平調宇宙安輔國家興兵發為使鬼袪邪今祭仙靈永為佑使須當隨吾機變依吾所為欲有不從當行太上之令玉皇之敕斬神之身滅神之德伏惟靈通下垂聰聽再拜上香舉酒次設拜跪滕叩齒祝云弟子姓某謹遇大會之夜敬祭于二三玉女之前切念某惟性自然心受天章本師有約太上之傳今遇大會聊獻于觴風伯灑掃雨師淨壇奉祀某心好禎祥陳名通姓願奉真光終身奉祀永不相忘今日拜祭美食脯香安邑大棗細核小穰百清香酒浮蟻傾漿時新五果白米嘉糧歆受我祭恣意斟嘗酒醉食飽隨我行藏凡有禱語一一相當常隨我所常祐我傍我之所願遂意吉昌我所到處與真偕行隱顯往返萬事安康速成大道早達仙鄉我有諸苦真與告祥我有所欲真當隨長入敵保國萬事為良扶衛我身與天地藏傾灌奠酹伏惟尚饗急急如太上律令勑又再拜上香逐一誦本身呪取氣一口吹座上密云丁卯玉女得太上六陰經洞微真文知神之姓知仙之名有法召仙有法使神往來三界出幽入冥行住坐卧皆賴仙真召之立至召之立臨人間萬事令我通聞願以昭報幸勿違戾急急如律令勑念三遍從丁卯方取氣吹之次丁丑吹之别方同再虔上香呪曰能役六陰出幽入冥無畏無怖亦無所驚隨吾符轉隨吾印行祛除萬禍集福一身日動夜藏不得違令急急如律令勑如是繞匝畢如此六處一同正位上香再拜訖收符一道撚成圓子用各位酒服拜謝畢如此六處一同正位上香念此語云吾今奉法吾乃為師以真為弟吾欲所遣神可隨吾自此已往不離吾身金錢雲馬助真之程凡有施為不可失信燒化錢紙畢收座宋尚書右僕射趙普進經表臣聞天之可度則覆物必廣人之有奇則建功不難設當時天運之亨必際風雲之會臣某始隨陛下收復諸國未嘗不失圖書於祕府功須不及漢之蕭相其志則無異也且諸祕閣所藏之書可謂祕矣如太白陰經驅雷兵三十六府氣運圖起風雲十二戒法縮水龜典拔木神經若此祕文不可勝數然究其實不亦難乎其義渺茫其辭枝蔓或受戒之後終身不飲有法之後舉族不葷既奉此遂不復奉彼修設或有反必有巨災不可急救臣愚觀之未得盡善一日有羅浮山隱士劉罕謁臣曰古有玄祕之文必得之矣臣曰諾劉罕以為未也因出紫囊於案乃焚香設拜啓囊取書授臣曰黃帝得伐殺蚩尤於阪泉之野藏之天府厥後授之堯舜禹湯文武戰國失之秦皇獨得焉驅神陰助既統海內復以無道失之逮秦歷漢或諸侯得之散落四海者多矣嗚呼有得而不能奉持者有行而不能恭敬者皆不能成功惟前漢陳平後漢鄧禹蜀諸葛亮唐郭子儀李靖五子得之恭謹而行每運用奇計人不可測凡行師出軍偷營劫寨雷風電雨隨時而至自五子已往此法不聞於世矣臣某慵懶隱于羅浮山積有歲矣先師珍藏是文積有年代曾戒臣曰若逢聖明真主啓運當有真人助之汝當持此以獻倘公能恭謹信而行之則功不在五子之下臣敬事之約半歲或聞有人耳畔言軍國利害臣顧室內絶無人迹疑惑心開或言曰吾乃六甲天神愼勿猜忌臣自此轉加敬懼厥後耳畔報應日逐事件不可遍舉至於親侍陛下收復諸寇勢如破竹非臣之謀長策遠實六神之力也且若行師之日王全斌崔彥迪劉光義曹彬等惟知臣事此神臣謂之曰某日雨某日風某日火燒營寨萬不失一其法可謂通玄捷徑劉罕豈凡人哉其人厥後隱遁寂不知其所以莫非天授我宋耶實囊括諸家之祕誠玄妙不傳之文直書其事謹録上進較其始終符呪止千餘字乞藏玉匱亦永保國祚萬年以賴神天之感開寶四年七月初一日奉聖旨玉匱藏之安祕書閣遁甲神經出處序昔蚩尤作亂黃帝頻戰不克帝曰聞伏羲治天下無兵今蚩尤一庶人生妖氣伐而無功戰而不克吾之過矣忽目前五色雲從空而下雲中有六玉女持書出二童曰奉九天玄女聖命送遁甲符經三卷告與伐之願傳此文乃天地禍福是八卦之吉凶辨風雲之變動識氣候之成敗觀日月之盈虧論陰陽之順逆曉星辰之休咎知人情之勝負此術乃萬變萬化之法也帝乃長跪而受之二童子并玉女乘雲而去帝遂開函得陰符經三卷上卷乃神仙鍊丹抱一之術説長生之法中卷安邦定國撫安王民之法下卷論戰伐之事遁甲者乃玄女之法帝得之而設壇造印劍令依此戰蚩尤於涿鹿之野爾後厥勝藏之金殿後大亂巢黃楊出得之傳於凡世得之者夙緣慶幸遇之者決勝如仙可宜愼之勿傳下等凡夫六丁者天下之正神不同尋常青龍明堂太陽等神長隨玉女受之使唤在天地之內如隱身遁形以左手持刀閉氣一口右轉畫一圓圈聞惡人在內便於外作局子六尺如惡人在外便於內作局子六尺如在野外仍於野外作局子變神用算六條各長一尺二寸逐旬青龍依吹排之而直放算子到玉女門上以左手撁之算橫著閉門却從天門地户而去閉門了身形遁已每一算子存為一人也玉女到太陰住想外人不見我也仍先念淨口身神呪左手結印右手執劍踏北斗丁罡七步披頭仗劍念了淨口淨身神呪閉目藏睛默念七星名字一遍斷訣關土地念呪須向方取氣吹之前却便捏火行此法出入行軍用焉不問凶神惡煞入地回避不敢當途他衆我寡或萬軍圍掩但望天罡取氣所指之方去千軍不覺萬軍不見此玄妙口訣千金不傳萬金不度勿泄天機乃護國之寶不為人見矣祕藏神玄變化六陰洞微遁甲真經卷上
