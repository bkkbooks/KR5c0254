front:
  text: 祕藏通玄變化六陰洞微遁甲真經卷中履二
  hash: sha256:8fcec1aaf3fbe7ee0234be2d330726f310233078a352d2090db8467976b664cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0254_HFL_002-001a, image: hfl/0576/0576-028.png}
body:
  text: 太上老君六除玉女洞微經法上傳授感應式太上曰夫欲入道必先探賾玄微奧㫖興兵發馬守道潜形祛邪逐惡保佑元真此乃吾之至要之門進登仙品莫非是事況此法也通天清之奧路達地濁之淵微理燭古今道冠萬術於身益者上謁官長利見王公逐鬼退殃迎祥致福飛符走印制伏狂妖求道欲仙恣情任意於國益者興兵發馬立紀陳綱治水潦之灾滅饑饉之苦乃感王侯之夢合諸人物之心入水登山行幽坐險若非此法安可如然而登玄理太上曰吾傳此經法流布人間以濟仁人者之用事非是其徒切莫私味之可與子之千金不可泄吾六甲陰經者自古至今未嘗有不從此用事而得成道者也則在處禁衛吏兵即時為罰報殃滯灾咎橫生或非道之士恪以誠心資以世賄為意而等間傳授罰加倍焉太上曰夫欲傳授之士須當澡沐潔身鄭重先炷名香仰視北辰運心所禱臣乃太上弟子昨於某年月日拜受太上玉女六陰洞微經法伏願天垂福祐地賜休祥大道速成願心早畢臣受此經法以後永為行持無輕誑語無易泄非人無橫用邪為無柱求雜慕臣得此法願求長生次利百姓濟民助國退濁入清蕩妖殺邪惟希三天大鑒萬象咸知賜臣通靈使臣遂意如或妄行妖邪臣甘犯天誅聖真勿祐急急如律令施行六陰隱祕要六陰者六甲之陰也甲子之陰乃是丁卯甲戌之陰丁丑甲申之陰丁亥甲午之陰丁酉甲辰之陰丁未甲寅之陰丁巳六丁乃六陰也則六甲之為陽將六丁為陰神用六丁而不用六陽者陰為無也無則能變化能有能無出生入死包容隱顯也如臨軍之用兵法也六陰無形用之則應凡有道之士用陰無道之士用陽陽則可測陰則不可窮也上卷獨言祭六丁法或曰六本無形何必祭之曰以有形無祭禱之無形之神有無相合也故存神叩齒心念口告助以香醪薦以美食祝而祈之依法用事無不感通也昔黃帝征蚩尤七十二陳晝而方寐夢一神人教以祕法既寢覺於盛囊中得法曰六陰洞微乃六丁祕法六甲飛宫而變通也因此而依式行持遂滅蚩尤也此法乃太上正一玄真之法非妖邪之法也得傳授者具表申聞天閽奏於上帝盟立誓言不得妄意興妖邪行非佞不然則反被六丁神為責大犯天誅也可當正心正行用之應矣太上老君曰昔以此法於后風后授太玄先生黃石公黃石公授張子房此法行之於人間時有得而傳之矣六丁玉女名儀服色丁卯玉女名足日之又名丁文明字保中又字仁高號無極仁福真君玉女狀貌青朝服戴兔頭冠黃裙斂愁眉左手執如意珠右手仗劍子丑日下降奉事在人家東廳閣丁丑玉女名氣無上又名丁文公字太和又字仁貴號橫天仁實真君玉女狀貌青碧朝服戴牛頭冠淡黃裙手執㦸或袂含笑寅卯日下降奉祀人家東北牛欄或司命之所丁亥玉女名陸明集又名丁文通字廣陽又字仁和號都府仁元真君玉女狀貌黑朝服頭戴猪頭冠淡黃裙手執仙果仗劍辰巳日下降奉祀人家北角厨厠左右丁酉玉女名救欽靈又名丁文卿字正一又字仁修號亞夫仁休真君玉女貌瑩色雞頭冠白素朝服淡黃裙蹙斂黛眉手執弩箭枝二戌亥日下降奉祀人家西廳殿閣丁未玉女名乘素靈又名丁菽通字玄英又字仁恭號無比仁至真君玉女狀貌瑩色戴羊頭冠紅粉朝服黃裙含笑手執雙㦸或劍午未日下降奉事人家南廳閣丁巳玉女名朱福稱又名丁廷卿字文廣又字仁敬號高上仁德真君玉女狀貌緑色朝服紅裙頂蛇尾冠手執長矛大笑申酉日下降奉事人家東南林池館所右陰神六丁玉女亦各有所掌各戴冠纓青裳素服朱履執刀劍弓矢或於六丁日現於奉事之家男女倘見其形勿令驚怖仍不得叱嘖叫唤恐有所觸犯矣六丁玉女所掌事宜丁卯玉女掌草木能呼嘯風雨嵐霧障蔽道途又能驅旱癘救苗稼在天主木青氣春生鎮人肝魂應蒼石丁丑玉女掌蟲獸能推運寶貨發泄伏藏又能增長百藥療人疾苦在天主五穀四時之中氣鎮人泥丸應碧石丁亥玉女掌山河能運泰嶽掇為小山填塞道路疏决河渠又能使金石裂地道在天主水黑氣冬藏鎮精腎應玄石丁酉玉女掌江海能鼓風濤淘沙拆岸回潮捲日又能吹一葉成舟楫浮度載人在天主金白氣秋收鎮肺主魄應白石丁未玉女掌嶽瀆能化陰兵助征戰又能救生産水火刀兵諸厄在天主土德四時餘氣黃色鎮脾胃命應黃石丁巳玉女掌城社能决陳解圍取城破寨又能呵氣决諸寒熱不時之病在天主火赤氣夏長鎮人心神應赤石造壇之法用竹纂子共十八箇六箇長二尺五寸六箇長五尺六箇長四尺作三層釘之中央先釘五尺者六箇分作六面上安真武印鏡子一面可方圓二尺許次外釘四尺者六箇安六丁玉女之位二層各安五色幡子十二箇於中央并二層竹纂之上依方所屬繫之亥子方用皂乃西北方上如寅卯東北方用青巳午東南方用赤申酉西南方用白幡四首安於丑北方側辰東方側未西方側戌北方側四幡用黃各布之方圍四尺又次釘纂子六箇各長二尺五寸者安淨布六條㼭之鋪壇畢却用緋線穿牽繞三層作六門各立六丁旗依方色相安六丁位每位上各書本身符一道六位面各照壇外背向內木劍六口木刀六口小弩子六張每箭二枝㦸三條戈三條隨六丁所用之又供養中央一位是真武之位用酒果餅食香三爐第三層供養五穀雜粱菜果鮮魚鹿脯乃是樟柳造成脯也酒六盞歡喜團七箇於大會日甲子夜二更後向北方烈火焚香仰視北辰依前懇禱手執此經稽首再上香臣傾心瀝志集氣會神再拜上香以虔盟誓臣乃太上老君弟子以久清淨誠誡天機不欲塵凡皈依大道臣謹謹拜懇專奏上聞伏願真靈俯垂憫念臣拜授太上老君玉女六陰洞微經法臣欲行持願垂洞鑒受法之後不敢輕易非急難助國救民誓無謬用臣對聖前誠誓此言或不遵依甘當罪罰凡有急緩救應願垂感通加護臣拜上香進前默云臣今欲請二三玉女為臣之使上達天庭下巡世界行符飛印祛邪治妖一切運行從臣所使伏願聖聰親垂洞鑒再拜上香祝曰臣所啓事畢已告御前更冀衆真時行護佑拜畢收座預先於癸亥夜先寫一狀并符請六丁玉女令列狀式于後大會伸意狀式具鄉貫法位姓名右某輒露丹衷上干真造所伸意者今據某事切聞大道真文洞微祕典六陰玉女六丁大神仁通三界普往四方助國濟民安人利物切念某叨居人世身處塵寰欲以行持未受玄奧先於某君門下傳受古法黃帝洞微經六陰玉女六丁大神祕訣符印呪文一宗皈身崇奉助其正道庇家保命助國救民今者伏遇某月某日甲子之辰謹備凡儀輒陳衷悃願於癸亥之日謹具狀申請降真靈願垂降鑒須至申者右謹伏請丁卯玉女無極仁福真君丁丑玉女橫天仁實真君丁亥玉女都府仁元真君丁酉玉女亞夫仁休真君丁未玉女無比仁至真君丁巳玉女高上仁德真君恭望真慈允臣所請願垂專念俯察私心至日特降雲軿下臨壇席密行昭報專俟感通冒犯真威某下情無任激切之至謹具狀以聞謹狀年月日具法位臣某狀外用實封圓皮金錢雲馬各六分粘連本身六符并印樣并差將吏直符用金錢焚之賫持前去投達隨分香案供養向來請席再拜呈狀內事意另外一封申請真武真君請真武狀式伏望真武真君至日下降壇所證盟行持甲子日奉事人勿行輕殺生靈慈和心情於壇中設位依式行持間人不得入壇只可於壇外幹事勿使僧尼女人兒子視之并忌雞犬六畜為犯上香酌酒皆奉事人自行近前奠先於丁卯真君前啓請又焚香并符一道乃合同符也誦本身呪取本方氣吹之次丁丑丁亥丁酉丁未丁巳依次啓請焚符逐一取氣吹壇上伏乞真靈俯垂大造隨請下降法駕受臣懇禱逐一請畢左手中指右手大煞文叩齒三十六通念六陰六丁玉女八素隱言呪曰龍曜九氣五嶽從之天蓬四聖十元八極斗星北靈十二日直玉女六丁願垂真光助法勑攝吾奉太上老君洞微律令勑右念三遍逐一攝六丁本身訣玉女名召之取逐方氣吹入壇中請坐燒本身符六道於壇中叩齒暝目存想玉女六位降臨壇所先請真武真君降壇中再拜上香祝曰臣今請真武真君外次焚香請召二三玉女想已降臨坐吹某稽首再拜某是太上老君弟子久持聖道欲願長生履清淨規行奧妙事長親至道稟聖修行上薦九玄七祖下濟萬民灾殃某奉持法籙依道科行今欲置壇裝嚴淨室依科營辦享祭真君仰賴威光俯垂洞鑒今臣欲求妙理為國安民行水運符祛邪治鬼上助國家之用下扶人命之為求仙學道利濟生民不論巨細一切運動之事皆賴威仙當作使者助某行持聽某指揮東西南北悉皆從順稱名畫印即時來臨凡有呼召火急報應臣意所咨不可失信記其所言刻骨銘心復上香再拜輕輕近前低告曰吾領太上之令玉皇之敕平調宇宙安輔國家興兵發馬使鬼祛邪今祭仙靈永為佐使須當隨吾機變依吾所為若有不從吾當行太上之令玉皇之敕斬汝之身滅汝之形伏願靈通下垂聰聽再拜上香真武真君舉酒三次設拜跪膝叩齒祝云維某年月日時弟子某謹遇大會之夜敬祭于二三玉女之前切念某惟性自然心受天章本師有約太上傳詳今當大會聊獻于觴風伯灑掃雨師淨壇奉事弟子心好真祥陳名通姓願奉真光終身奉祀永不相忘今日拜祭美食脯香安邑大棗細核小穰百清香酒浮蟻傾漿時新五果白米嘉糧酒醉食飽隨我行藏凡有禱語一一相當常隨我所常佑我傍我之所願隨意吉昌我所到處與真偕行隱顯往返萬世安康速成大道早達仙鄉我有諸苦真為吉祥我有所欲真當隨長入敵保國萬事為良扶衛我身與天地藏傾灌奠酹伏惟尚饗急急如太上律令敕又再拜上香逐一誦本身呪取氣一口吹座上密祝云丁卯玉女吾得太上六陰經洞微真文知神之姓知仙之名有法召仙有法使神往來三界出幽入冥行住坐卧皆賴仙真召之立至召之立臨人間萬事令我通聞願以昭報幸勿違戾急急如律令敕從丁卯方取氣吹之次又取丁丑方氣吹之其餘倣此吹之再虔上香再拜起立步丁巳繞壇左東發步呪曰能使六陰出幽入冥無畏無怖亦無所驚隨吾符轉逐吾印行祛除萬禍集福一身日動夜藏不得違令急急如律令敕如是繞壇三匝畢就位上香再拜訖取符一道撚成丸子用當位上酒服之再拜謝畢又轉一位拜畢取符服之如此六處六道符服已畢在壇正立上香再拜默念此語云吾奉此法吾乃為君以神為臣吾所欲為神當隨情自此已往不離吾身金錢六分助真雲程凡所施為不得失盟燒化錢紙畢即收座席收座上供獻物自喫若不喫埋之散壇而退此是大會祭式施設如小會則不然凡遇散甲之日當旬玉女即備一分錢馬祭之祭物一分餘皆香茶酒而已黃帝曰奉事六丁人欲得長生者皆當六丁之日不得淫欲殺生更能存守中正精氣內外即不過六會六丁獻汝還丹常因事而成道身為地仙乃得長生如欲要安邦安國行師閫外百戰百克奉事六丁人若至六會神出現其分明見其形像勿起私心即當虔誠恭敬不得妄想邪心犯之者立殺其身六丁能乎進退以致守城戰敵出奇八陳之法兼能攻敵國之密事及知敵人之心舉措之謀無所不通凡有行持建業立功以至起工婚嫁賭賽祈雨求風伐賊破廟去毒殺怪屠龍驅虎無所不驗治病除害此法其中自有條格奉事人不願長生欲求富貴者即六丁驅運財寶理會造化如奉祀人欲知父母存亡叩而立至可知存亡如要自知前程之事與夫長短叩之六丁能報至實凡有舉為自有報應遇大會甲子第一會服符第二會不必服如第一會起首服符但一旬服六道六會服三十六道如第一會服六六三十六道符第二會不必服依式祭之如一年不及六大會二年祭足亦得其小會不缺也凡會書六丁符及諸符用朱砂黃紙書當用真武印印之祕藏通玄變化六陰洞微遁甲真經卷中
