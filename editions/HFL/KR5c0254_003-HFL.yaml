body:
  text: 立壇法式壇式之國立壇式用纂六箇長四尺六箇長二尺五寸六箇長五尺五寸先以五尺五寸者釘在中央分作六面上以淨布填之可方圓二尺許次以四尺者又以二尺五寸者釘訖將緋線欄作六面可方圓六尺第二方圓四尺第三方圓二尺第二纂上安旛子十二首自子至亥象色而繪之隨所屬色如亥子屬水用黑色次第布之層層之下以淨布或案子各六面各安木刀一口立在壇下第一安眞武印在壇中圓鏡一面纂安六丁像旗丁丑黄丁卯青丁巳赤丁未黄丁酉白丁亥黑第二層上各安六丁位次丁酉位上安小弩一張箭二枝丁巳位上安小戟一張丁亥位上安劍一張丁卯位上劍一張餘二位無物又以棗木板六片繪玉女眞相在上於眞相下書符朱書各於本位上如法安置各面照外背向背凡開啓各於其屬之神前用事尋常設拜席只在丁亥面前以向北方眞武也壇内祭物五穀内雜糧六分香爐六箇茶六盞淨布六條鮮魚六頭鹿脯六碟酒六盞此大會都祭之法如小會逐旬於所當祭之神祭之用燒錢六分凡祭時切莫稱呼六丁字乃玉女諱此字也只言二三玉女一午大會止有六箇甲子乃大會也祭餘只是六丁日各於位下祭之且如丁丑日只於丁丑神用物一般餘五位只以香茶祭之遇甲子日大會則如前式同祭閑時拆去壇場如祭之第六會則不拆去要用事也大凡六度各圓備志誠之士以一年祭就乃幸也如六祭畢存留壇場於室内逐日只自出入切忌他人莫令見之爲尚一年有大會六日小會三十六次如事多一年祭不敷則祭一大會遇小會不可蹉過反招其咎至祝至祝壇上畫符神象之法及書名號並依法式丁卯符丁丑符丁亥符丁酉符下未符丁巳符六陰符此符用棗木板子一寸五分一面書符一面刻玉女名字帶於髮中非梳頭不可取下丁卯玉女足日之字保中號無極眞君此符書于黄紙上安丁卯玉女位并書一道于牒前用呪曰無極之眞足日之身爲吾所請從吾所行急急如律令敕書訖念呪三遍取東方炁吹符上左右手掐大煞文訣足丁罡履日藏形云云丁卯合同符此符念前呪書于丁卯位朱書黄紙同前符爲丸酒服丁丑玉女炁無上字太和號横天眞君此符安丁丑玉女位下并書一道于牒前通用呪曰太和至聖横越天眞爲吾所指依吾所陳急急如律令敕書訖取北方炁吹符上念呪三遍丁丑合同符此符與前呪訣氣同仍爲丸照前以本位酒服之丁亥玉女陸明集字廣陽號都府眞君此符朱書黄紙上於丁亥玉女位下及書一道于牒前用呪曰廣陽眞君名字陸明爲吾所指助吾所行急急如律令敕念呪三遍取北方炁入符丁亥合同符此符同前書呪訣炁作丸子以本位下酒服之丁酉玉女救欽靈字正一號亞夫眞君此符朱書黄紙上安於丁酉位上又書一道于牒前取西方炁吹符上呪曰救欽之靈亞夫大眞爲吾所指佐吾所行急急如律令敕丁酉合同符此符朱書呪炁訣同前爲丸子用本位酒服之丁未玉女乗素靈字玄英號無比眞君此符朱書黄紙上安于丁未位前書一道于牒前用呪曰無比眞君名曰素靈爲吾所使聽吾所陳急急如律令敕呪三遍取南方炁入符丁未合同符此符朱書呪炁訣同前爲丸子用本位酒服之丁巳玉女朱福稱字文廣號高上眞君此符黄紙朱書安丁巳位下一道牒前用呪曰高上之眞名曰福稱爲吾所指爲吾所陳急急如律令敕取南方炁吹符上丁巳合同符呪炁同前爲丸子用本位酒服此玉女符凡欲所使依句書召之或於牒或書背後寫其事情用眞武印印之背用六丁印印之依前用玉女神呪炁訣召之大獲神驗矣一法用符方二寸一面書符背刊名棗木版朱書呪三遍安座上六丁姓名下降符日丁卯玉女子丑日宋鑴文伯下降丁丑玉女寅卯日梁錡元公下降丁亥玉女已午日姚鉚文道下降丁酉玉女戌亥日申鍬文卿下降丁未玉女申酉日朱釣升通下降丁已玉女辰已日陳釣廷卿下降眞武印闊二寸四分長三寸二分陽印形陰印形凡此二印取庚申乙巳甲寅己亥日取棗木刊陰陽二印左右臂帶之陽印當懸左臂上陰印當懸右臂上日中使印即以陽印乃至感君侯之夢祈雨祈晴祈雪一切象天法陽之事即用此印乃是丁卯丁丑丁亥三玉女之印也故屬陽也此玉女指揮事意即隨此轉也皆係陽印用事也凡陰印即懸帶右臂上夜中使印即取用之乃至求財役鬼祛妖夜間求禱地下動作入水入幽一切象地法陰之事即以此陰印印之乃是丁巳丁未丁酉三位之印故屬陰也此三玉女隨印所使而轉也并係陰印用事也祭印法凡刊就二印訖時却於甲子大會即於北辰之下設席祝云奉請魁𩲃𩵄䰢魓𩳐魒眞君下降臣今依太上之法刊造陰陽六陰洞微之印指使玉女惟願威靈先爲臣悟眞證盟吹上香左右執印目觀北斗閉炁取北斗眞炁次第至魁取炁一口吹在印上如此每印各三次取炁吹之用五色線繫印欛帶在左右手臂上如祭時及用事時并岀入一切動作時方帶之如非時在家不可帶宜安於壇上供養閑暇不祭時不用事只一日早晨取淨水一盞供養爲佳不得尋常用祭如大會之日切不可行房事汙雜葷腥近身須要時時鼓咽津液灌洗五臟此經如神仙之深隱萬術之首規天地同根古令並固後世如有遇者亦乃仙籍有名夙生慶幸實非易事縱若不行而家貯之敬之一切禍事不敢入門切在至誠莫類他卷宜安清淨之器貯之無令穢染閑詞非時不得輕翫亦不得妄起邪心本欲利濟存亡切恐翻成殃譴學者切要正直宜深思謹愼爲尚至祝至祝法門變通動作列于下卷行持符法六丁玉女之印印之式範闊二寸四分長三寸二分擇木長生日採棗栢木刊之於甲子庚申之日以印諸符文祭法但依前法祭之非時不得亂用急難所以懸掛當以衣遮蓋能脫其禍矣用絳紅羅錦作袋子盛之不可令雜人見之恐不靈矣夫行持之法須先設祭然後變通設祭在先變通在後凡動作感夢求物捕獵主兵馬遣鬼神祈旱澇登山入水攝盜破魔求官覓仙求奴覓婢迎藏君子退逐小人萬種所爲各有符法至誠鄭重勿易輕心俯地仰天當於正用非特安邦助國亦能護道養身稍若行邪罪干九族誠在專督頂戴二三玉女者凡於庚申乙巳甲寅己亥取棗木心四方面各刻二三玉女名號符焉用五色絲囊袋之安頂心非梳頭時不可解凡書符式凡書一切符命俱用朱書無朱京墨亦可逐時須向旬中三位上設拜行事餘神助之一切須向符邊寫旬中三卜神名號即玉女也用眞武印朱印之合是陰陽印虚印再印之陽事用左臂陽印陰事用右臂陰印尋常吞服符但是用符一一如此爲之切宜專謹不可悮爲也動作變通神應符備列于後感夢符六道第一道感帝王之夢符法此符感通至尊之夢但六度祭畢玉女自然現身不須燒符玉女自執去行此符時遣當旬玉女餘神助之早起朱書此符却於側邊書當旬玉女眞君名字上用眞武印印之次以陽印虚印一下次書開禁户符第二開禁户符此是開禁户符亦依前法書及神名用眞武印及陰陽印撻之右二符一處手執於當旬三卜玉女前祝曰吾今欲求某事隨意言之遣神持此二符直達帝前開皇庭禁户夢中奏帝云某州某縣某人名字年已行持大教爲帝安國帝當善護毋令見害或求官或别用事隨意告之如此咨聞了用清酒金錢一分連符香茶燈菓供養在當旬玉女眞君之前至夜二更即念當旬三卜神呪三遍見在前神名下取紙一時燒化口中言急去急應不可遲滯便吹滅燈收茶更自坐至三更盡方睡不經旬日必有報應帝君必受神人所資之事决無違也乃至求官所爲一同凡欲感五音人夢符法並同前訣造之發遣只不用開禁户符蓋須用也凡是官員僧道各依五音用之感五音人夢神符五道宫商角音音音徵羽音音此符感五音姓人夢並用前法書之發遣不可用禁户符並庶人不見須用也不問官員士庶僧尼道流各依音姓書用之無不感應祈求旱澇符法凡欲祈雨祈晴祈雪春夏秋冬各有神之所主春太和眞君太玄眞君太泯眞君夏少一眞君少微眞君少明眞君秋太無眞君太全眞君太宫眞君冬少固眞君少眞君少靈眞君春祭於乾亥之方即旺氣之方夏祭於艮寅之地秋祭於巽巳之方冬祭於坤申之地凡祭祈求方蓋長生之地也三眞祈求召符三道右符三道依時换神君之名書之於側於當旬玉女前祝云吾見人間缺少雨水民庶失業吾今遣神持達某三位眞君來日當至吾壇某方之地受吾咨禱如春夏秋冬則改青錢一分奉送雲程急速急速燒紙并符於乾亥之地此春祭太和太玄太泯三眞君地也如夏秋冬各請眞君各隨其地設三位用香燈酒果供養了上香再拜叩齒至誠祝曰臣聞蒼天杳冥浩蕩玄眞臣雖愚昩性合上清今民失業求雨渴望膏霖求晴顒望晴暉臣行是法祈禱恣禱玄眞受臣微祭願鑒臣心執臣之符爲臣奏聞皇天垂鑒願賜甘霖晴暉臣所奏懇用祕符文伏惟眞慈俯垂聰聽青錢三分用送雲程佇望感通即時來應燒紙連符收座禱雨符祈晴符此符並用五重封角下印依前作用此係奏玉皇上帝符也不可輕易求雪符同前祈禱法呼風符若欲呼風雲春夏秋冬各有所主春東夏南秋西冬北告玉女燒符大呼大至小呼小至通仙符凡欲作此法欲到某處朱書一道告玉女一道手中執之閉目藏睛即刻到也延壽符此符能令人延壽長衆人愛敬如意符凡有所愛用眞武印印之安在在處告玉女其物自至如其意枕中符此符朱書安枕中邪魔自消進君子遠小人神仙欲至預有夢兆令人皈向符若令人向者朱書三道一道告玉女一道繫臂一道含口中求告皈順令人愛敬符朱書告玉女并書其人姓名年甲所屬星辰於其符下其人自愛念覓酒符覓食符凡欲覓酒覓食於當旬玉女前書三道燒於神前酒食人送至覓奴符黄紙朱書凡欲求奴及婢預書於當旬玉女焚之奴婢自來感應非常覓婢符召相知符此符欲召相知人先書符次書某人姓名於符上祝當旬玉女云吾欲一見其人來旺利符朱書告玉女帶之凡百旺利萬倍若人欲置財寳朱書桃板懸門下則商賈自來財利旺矣入水符欲作此符先告玉女了朱書二道用印印之貼在左右脚心行水上如平入海符此符先告玉女投於海中當有龍神擁護波浪自息要船住即住要行即行即應矣行兵甲符三道此三道符用行兵法至誠朱書先遣玉女持此三符達知彼禁吏又篆三道埋於征戰之地更領吏兵出軍自帶三道尤好隱遁潜形入軍圍中符凡欲入軍行事書此符六道告玉女畢吞三道頂一道左右手各持一道禹歩入陣走入軍中諸軍皆不見役使鬼神符三道第一道凡欲役使鬼兵先篆此符於當旬玉女前祝云吾今爲某處有某事意欲下手修持隨意所請神當爲吾傳符速至五道將軍速於某日撥發幾許戈㦸鎗棒弓弩一一齊整來吾左右指揮用事臨時須當了畢如不依吾之令吾即斬鬼殺神莫言不告急速急速燒符了便去第二道此符依前至誠朱書禹歩至門前向五道將軍云汝等領二三玉女并鬼部吏兵即時齊往某處修造某事須當獲時了畢不許遷延如或因循斬汝之首用工之後各有錢酒謝汝勤勞急急如律令燒符又行第三道若欲作此法當至告玉女篆符令人持往作事處或前後釘亦可用印事畢燒錢謝之神應莫測妙之妙矣攝神符凡作此法用眞武印印告玉女燒一道勑當界土地問此間有甚怪焉追魂符天有三奇散形日月星人有三奇聚形神炁精此法用厭惡人及官司等事凡作法先書彼人姓名年月日時并事意於符下用雞卵一箇亂頭髮一縛符打碎雞卵拌符入合子中作法埋於鬼門上不解不止其人昏晦如醉祕祕祕祕祕不可妄用收寇符凡欲捉賊先告玉女燒香書符五道埋於五路其賊即獲伏虎符亦曰斬虎符若居山中朱書此符告玉女貼於山上其虎自來在符下受降或投虎所自至受誅降龍符亦曰斬龍符凡作此法於發洪處投之其龍自死出水面上狩獵符狩獵依前書符告神方去更書帶之自然得獲集怪符呼蛇引怪集鳥歸魚並用此符二道告玉女燒一道手中執一道口中含一道輕輕唤何物即至欲遣之即燒手中符于門外行路借鬼兵符若行路往來欲借鬼兵凡所到處書符一道要鬼吏多少扶持到某處交易即時發回填破缺符凡有破缺溪澗告玉女朱書二道一道告玉女一道埋當處自然填滿復元取符燒之生産符救生産符書四道一道與玉女燒三道付請符人去淨水調與産婦吞下男左女右執符出死胎頂符出横生者骨軟而生治枉死鬼符若有枉死投河自縊投井卒死者急書此符於左右書當旬玉女名告當旬玉女曰今有某人某事卒亡吾以此符救之神與急去用心救治符到奉行追攝魂魄付患人身即時取活速以此符安入口中頂上用艾炙之三炷即活收鬼符朱書召玉女或埋或釘或貼鬼自滅亡矣治萬病符三道凡欲遣此符治病右三道治一切患上香告當旬玉女曰吾今治某人病神請用力隨符救治符到奉行遣鬼退邪速爲安復仍寫玉女名於符上降眞香吞即瘥治瘟司神符此符朱書之黄紙上先一日書一道依法作用於當旬玉女前爲吾持符至某處某人家司命禁忌官屬等神吾來日至此治瘟殺鬼疾速攝神廟當處等神伺候施行速去速去焚之治瘟疫鬼符此符用紙一片闊五寸長七寸令病人花押就上書符蓋了病人花押此符使六神司命又治瘟符令人寫花字書符背上治瘟鬼治瘟疫病者服符此符以降香湯下先書白玉女治瘟疫收攝病源保佑安泰治病不拘遠近取驗符此符治病人黄紙朱書一道用眞武印印之先告當旬玉女焚看病者是何病疾無不痊瘥若病人在三五里之外想病人處告玉女書符用印燒吹符向方而去或千里之外祝其病之所在無不驗矣治病法謹請甲子旬丁卯神甲戌旬丁丑神甲申旬丁亥神甲午旬丁酉神甲辰旬丁未神甲寅旬丁巳神前去療病某人身中某疾病請爲解灾釋難驅除禍祟急還病人魂魄立即取效符到奉行不得遲緩急急如上清律令指揮即了便往救治立即除愈治病六符符上玉女眞形平身若治病不用印頭勑符呪九天勑下日月星符左勑青龍右勑白虎前勑朱雀後勑玄武四十萬人辟除不祥符到之處永亨利貞萬邪入地惡鬼藏形急急如律令治病擲座法如有薄福之人使神不應者遲緩亦同即當書旬中符呪之擲於神座其神自速至假如甲子旬書卯符他倣此呪曰謹請甲子旬子卯神前去某處幹事救人其事宜速不得有違呪符訖擲著丁卯神座前即住乃至千里之間立有報應問諸吉凶之事乃與人說欲縛鬼神但捻手中鬼目其鬼即死若惡人要來書惡人姓名吞之捻人目即自來也召六丁擲座符凡書符下筆存思玉女畢如斷銅截鐵先點二十八點象二十八宿念星點之四點象四時八遍念呪象一年八節凡點下不得再點如得此符似三五將軍六丁神將力士天丁千金不受永爲身寳祕之祕之其靈萬法之最也薦拔亡人冥府符此符是薦九幽七祖入幽冥地府之符亦薦衆亡人先篆三道玉女之前告之曰吾有九玄七祖滅亡未知所在或曰吾有亡者某人滅亡以來未知所往所在神持此符直至地獄幽嶽召官吏問之吾亡過某人即時赦放急速急速言訖焚之其亡者見現矣右件諸符一一朱書無朱京墨亦可以印印之凡有作事書符一道左右書當旬玉女名至誠啓告所懇事宜自大會祭後不須一一結壇只是香茶酒果焚香告白志心禱祝玉女自然現本相也符亦不須燒自然去也靈異無窮法子得之以爲至寳敬之則九族受慶福禄榮昌亦可登仙證道慢之則六親致殃禍患來至亦以沉幽作鬼可不愼歟念兹在兹勿生雜念若夢中往返身形或婦女身邊坐卧即是玉女降現自此其法漸漸如意如六神曰乆出入現影現形或耳報或在眼前則法子夙縁至矣不必演遁但隨心啓告便行便報得此者實乃宿生有仙之名分矣以致今曰得此道矣此上至玉皇宫闕下至地府冥司一切所爲無不感通萬金不傳古人云寧與人千金不可與人六甲之陰也秘藏通玄變化六陰洞微遁甲眞經卷下
